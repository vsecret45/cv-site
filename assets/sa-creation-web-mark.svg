<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
    <title id="title">SA Création Web monogram</title>
    <desc id="desc">Radiant futuristic SA monogram with metallic letters, a glowing sphere, orbital rings and a dark star field.</desc>
    <defs>
